<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte – STELLR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    <div class="logo">STELLR</div>

    <nav class="menu">
        <a href="index.html">HOME</a>
        <a href="shop.html">SHOP</a>
        <a href="account.html" class="active">ACCOUNT</a>
        <a href="contact.html">CONTACT</a>
    </nav>

    <div class="icons">
        <span>🔍</span>
        <a href="login.html"><span>👤</span></a>
        <span>🛒</span>
    </div>
</header>


<section class="form-section">

    <h1 class="form-title">CRÉER UN COMPTE</h1>

    <form class="form-box">

        <label>Prénom</label>
        <input type="text" placeholder="Votre prénom" required>

        <label>Nom</label>
        <input type="text" placeholder="Votre nom" required>

        <label>Email</label>
        <input type="email" placeholder="Votre email" required>

        <label>Téléphone</label>
        <input type="tel" placeholder="Votre numéro de téléphone" required>

        <label>Adresse</label>
        <input type="text" placeholder="Votre adresse" required>

        <label>Code postal</label>
        <input type="text" placeholder="Votre code postal" required>

        <label>Ville</label>
        <input type="text" placeholder="Votre ville" required>

        <label>Mot de passe</label>
        <input type="password" placeholder="Créer un mot de passe" required>

        <button type="submit" class="submit-btn">Créer mon compte</button>

        <p class="redirect">
            Déjà un compte ? <a href="login.php">Se connecter</a>
        </p>
    </form>

</section>

</body>
</html>
